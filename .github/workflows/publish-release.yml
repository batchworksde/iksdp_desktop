name: 'build Debian Live image and publish release'
on:
  push:
    branches:
      - "main"
    paths-ignore:
      - '.github/**'
      - 'docs/**'
jobs:
  buildImageRelease:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: checkout code
        uses: 'actions/checkout@v6.0.2'
      - name: prepare environment
        env:
          ROOTPW: ${{ secrets.ROOTPW }}
        run: debian-live/build.sh prepareEnvironment
      - name: remove not required folders from the build system
        run: debian-live/build.sh cleanupRunner
      - name: Fetch build system infos
        run: debian-live/build.sh fetchRunnerInfos
      - name: install prerequisites
        run: debian-live/build.sh installPrerequisites
      - name: config Debian Live image
        run: debian-live/build.sh configImage
        env:
          ROOTPW: ${{ secrets.ROOTPW }}
      - name: build Debian Live image
        run: debian-live/build.sh buildImage
      - name: generate Bill of materials
        run: debian-live/build.sh generateBom
      - name: generate md5sum of iso
        run: debian-live/build.sh generateMd5
      - name: upload iso
        env:
          SSH_UPLOAD_KEY: ${{ secrets.SSH_UPLOAD_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: debian-live/build.sh uploadIso
      - name: create release
        uses: 'ncipollo/release-action@v1.21.1'
        with:
          name: iksdp-desktop-${{ env.RELEASE_VERSION }}
          artifacts: "${{ env.BUILD_DIR }}/iksdp-desktop-source-${{ env.RELEASE_VERSION }}.tar.gz,${{ env.BUILD_DIR }}/bom/bov.cyclone.json,${{ env.BUILD_DIR }}/bom/bom.cyclone.json,${{ env.BUILD_DIR }}/bom/bov.spdx,${{ env.BUILD_DIR }}/bom/bom.spdx,${{ env.BUILD_DIR }}/bom/bom.spdx.json,${{ env.BUILD_DIR }}/bom/bov.spdx.json,${{ env.BUILD_DIR }}/bom/bom.json,${{ env.BUILD_DIR }}/bom/bom.html,${{ env.BUILD_DIR }}/bom/debian.packages.txt,${{ env.BUILD_DIR }}/iso.md5.txt"
          bodyFile: "${{ env.BUILD_DIR }}/changeLogForRelease.md"
          tag: "${{ env.RELEASE_VERSION }}"
          draft: false
          makeLatest: "legacy"
          skipIfReleaseExists: true
          allowUpdates: true
          updateOnlyUnreleased: true
